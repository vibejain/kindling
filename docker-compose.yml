services:
  kindling:
    build: .
    image: kindling:latest
    ports:
      - "8787:8787"
    env_file:
      - .env
    environment:
      HOST: "0.0.0.0"
      PORT: "8787"
      APP_BASE_URL: "${APP_BASE_URL:-http://127.0.0.1:8787}"
    volumes:
      - kindling-data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  kindling-data:
