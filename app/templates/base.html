<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kindling — Open-source email warmer</title>
  <meta name="description" content="Warm owned mailboxes with a private mesh. Gmail OAuth + IMAP/SMTP.">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="glow" aria-hidden="true"></div>
  <header class="top">
    <div class="brand">
      <span class="mark" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2c1.5 3.2-.2 5.2-1.6 6.8C8.8 10.6 8 12.1 8 14.2 8 17.3 10.2 20 13 20c2.5 0 4.5-1.8 4.9-4.2.3-1.6-.2-3-1.1-4.3C15.5 9.5 14 7.8 14 5.8c0-1.3.4-2.5 1.2-3.5C13.8 3 12.8 2.4 12 2Z" fill="currentColor"/>
          <path d="M9.2 21.2c1 .5 2.1.8 3.3.8 3.6 0 6.5-2.5 6.5-5.8 0-1.2-.4-2.3-1-3.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity=".45"/>
        </svg>
      </span>
      <div>
        <h1>Kindling</h1>
        <p>Open-source email warmer</p>
      </div>
    </div>
    <div class="status {% if stats.running %}on{% else %}off{% endif %}">
      <span class="dot"></span>
      {% if stats.running %}Warming{% else %}Paused{% endif %}
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="foot">
    <span>Owned mailboxes only · not for spam</span>
    <a href="https://github.com/vibejain/kindling" rel="noopener">GitHub</a>
  </footer>
</body>
</html>
